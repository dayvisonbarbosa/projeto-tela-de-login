<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-querie.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                    
            </div>

            <div id="formulario">
                <h1>login</h1>
                <p>Seja bem vindo(a) novamente, por favor faça login para acessar sua conta.</p>
            </div>

            <form action="login.php" method="post" autocomplete="on">
                <div class="campo">
                    <span></span>
                    <input type="email" name="login" id="ilogin" placeholder="seu e-mail" autocomplete="email" required maxlenght="30">
                    <label for="ilogin">Login</label>
                </div>

                <div class="campo">
                    <span></span>
                    <input type="password" name="senha" id="isenha" placeholder="sua senha" autocomplete="current-password" required minlength="8" max-lenght="20">
                    <label for="isenha">Senha</label>
                </div>

                <input type="submit" value="Entrar">
                <a href="esqueci.html">
                    Esqueci a senha <span></span>
                </a>
            </form>
        </section>
    </main>   
</body>
</html>
